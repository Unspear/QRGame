<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Game</title>
  </head>
  <body>
    <%= require('html-loader!./navbar.html').default %>
    <h1>QR Game</h1>
    QR Game is a platform that supports the creation of games which can fit inside a QR code!
    <br>
    <select name="games" id="games">
      <option value="none">None</option>
      <option value="pong">Pong</option>
      <option value="daisy">Daisy</option>
      <option value="infinity">Infinity</option>
    </select>
    <br>
    <button id="play-button">Play</button><button id="edit-button">Edit</button>
  </body>
</html>
