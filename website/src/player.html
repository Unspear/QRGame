<div class="play-bar">
    <h1>Air Hockey</h1>
    <div style="flex-grow: 1;"></div>
    <button class="square-button hidden" id="pause-button" title="Pause">
        <img src="icons/pause-button.svg" width="70" height="70"/>
    </button>
    <button class="square-button" id="play-button" title="Play">
        <img src="icons/play-button.svg" width="70" height="70"/>
    </button>
</div>
<div>
    <canvas id="game-canvas" width="192" height="256" class="hidden"></canvas>
    <div id="play-menu">
        <p>Air hockey is a game</p>
        <div style="flex-grow: 1;"></div>
        <div style="display: flex; flex-direction: row;">
            <button class="square-button" id="reload-button" title="Reload">
                <img src="icons/anticlockwise-rotation.svg" width="70" height="70"/>
            </button>
        </div>
    </div>
</div>
