<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="4d10eef7edbee652c0b1.json">
    <title>QR Game</title>
  <link rel="icon" href="favicon.png"><script defer src="vendors-node_modules_matter-js_build_matter_js-node_modules_sam-js_dist_samjs_esm_min_js-node-e3c053.bundle.js"></script><script defer src="vendors-node_modules_codemirror_legacy-modes_mode_lua_js-node_modules_codemirror_dist_index_js.bundle.js"></script><script defer src="page_js-pack_ts.bundle.js"></script><script defer src="player_ts.bundle.js"></script><script defer src="edit.bundle.js"></script><link href="f96725c2900464888d52.css" rel="stylesheet"></head>
  <body>
    <nav>
    <div class="bar">
        <a href="index.html">Home</a>
        <a href="play.html">Play</a>
        <a href="edit.html">Edit</a>
        <a href="test.html">Test</a>
    </div>
</nav>
    <my-tab>
      <!-- Radio Buttons -->
      <div class="tabs">
        <div tabHeader="play">Player</div>
        <div tabHeader="info">Info</div>
        <div tabHeader="edit">Level</div>
        <div tabHeader="code">Code</div>
      </div>
      <!-- Tab Content -->
      <div tabContent="play">
        <div class="play-bar">
    <h1 id="game-title"></h1>
    <div style="flex-grow: 1;"></div>
    <button class="icon-button hidden" id="pause-button" title="Pause">
        <img src="6cbc13b89c6fa5275a41.svg" width="60" height="60"/>
    </button>
    <button class="icon-button" id="play-button" title="Play">
        <img src="2c27e2d002fb0963f29b.svg" width="60" height="60"/>
    </button>
</div>
<div>
    <canvas id="game-canvas" width="192" height="256" class="hidden"></canvas>
    <div id="play-menu">
        <p id="game-description"></p>
        <div style="flex-grow: 1;"></div>
        <canvas id="qr-canvas"></canvas>
        <div style="display: flex; flex-direction: row; gap: 0.8rem;">
            <button class="icon-button" id="reload-button" title="Reload">
                <img src="7abd1f71baf49114aeb8.svg" width="60" height="60"/>
            </button>
            <button class="icon-button" id="url-button">
                <img src="86dba0d8d03edcf7ca0a.svg" width="60" height="60"/>
                URL
            </button>
            <button class="icon-button" id="qr-button">
                <img src="86dba0d8d03edcf7ca0a.svg" width="60" height="60"/>
                QR
            </button>
        </div>
    </div>
</div>
      </div>
      <div tabContent="info">
        <label for="info-title">Game Title:</label>
        <input type="text" id="info-title"/>
        <br>
        <label for="info-description">Game Description:</label>
        <input type="text" id="info-description"/>
      </div>
      <div tabContent="edit">
        <my-tab id="tilemap-tab">
          <div class="tabs">
            <div tabHeader="settings">Level Settings</div>
            <div tabHeader="draw-tile">Edit Patches</div>
            <div tabHeader="draw-patch">Edit Level</div>
            <div tabHeader="physics">Physics</div>
          </div>
          <div tabContent="settings">
            <label for="tilemap-width">Tilemap Dimensions:</label>
            <input type="number" id="tilemap-width" min="1" max="128" step="1">
            <input type="number" id="tilemap-height" min="1" max="128" step="1">
            <br>
            <label for="patch-width">Patch Dimensions:</label>
            <input type="number" id="patch-width" min="1" max="32" step="1">
            <input type="number" id="patch-height" min="1" max="32" step="1">
            <br>
            <label for="patch-count">Patch Count:</label>
            <input type="number" id="patch-count" min="1" max="128" step="1">
            <br>
            <button class="small-button" id="tilemap-settings-apply">Apply</button>
          </div>
          <div class="container-flex" tabContent="draw-tile">
            <label for="editor-char-input">Brush:</label>
            <input type="text" id="editor-char-input" placeholder="(space)"/>
            <select id="editor-color-input">
              <option value="0">White</option>
              <option value="1">Grey</option>
              <option value="2">Red</option>
              <option value="3">Orange</option>
              <option value="4">Yellow</option>
              <option value="5">Green</option>
              <option value="6">Blue</option>
              <option value="7">Magenta</option>
            </select>
            <input type="checkbox" id="editor-invert-input">
            <span id="editor-invert-label">(inverted)</span>
            <button class="small-button" id="editor-pipette-button">⛏</button>
          </div>
          <div tabContent="draw-patch">
            <label for="patch-id">Brush:</label>
            <input type="number" id="patch-id" min="0" max="128" step="1" value="0">
          </div>
          <div tabContent="physics">
            <label for="editor-solid-input">Solid Character(s):</label>
            <input type="text" id="editor-solid-input"/>
          </div>
        </my-tab>
        <canvas id="editor-canvas" width="192" height="256"></canvas>
        <p>
          <button class="icon-button" id="left-button">←</button>
          <button class="icon-button" id="up-button">↑</button>
          <button class="icon-button" id="down-button">↓</button>
          <button class="icon-button" id="right-button">→</button>
        </p>
        <p>
          <button id="export-button">Copy Level</button>
          <button id="import-button">Paste Level</button>
        </p>
      </div>

      <div tabContent="code" id="tab-content-code">
          <!-- Code editor will be inserted here from JS -->
      </div>
    </my-tab>
  </body>
</html>
